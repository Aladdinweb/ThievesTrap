name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          # Try primary source first, fall back to GitHub mirror
          curl --retry 5 --retry-delay 3 --connect-timeout 30 --max-time 60 -L \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 60 -L \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "JAR size: $(du -sh gradle/wrapper/gradle-wrapper.jar)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Find APK
        run: find app/build/outputs/apk -name "*.apk" | tee apk_path.txt

      # v2.7.8: Rename/verify the output APK matches the true version name
      # (build.gradle's outputFileName already produces
      # Thieves_Trap_v2.7.8_Final.apk via versionName "2.7.8", this step
      # just guarantees the artifact upload name matches too).
      - name: Verify APK name matches version
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          if [[ "$APK" != *"2.7.8"* ]]; then
            echo "WARNING: APK name does not contain expected version 2.7.8"
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thieves_Trap_v2.7.8_Final
          path: app/build/outputs/apk/debug/Thieves_Trap_v2.7.8_Final.apk
          if-no-files-found: error
          retention-days: 30
